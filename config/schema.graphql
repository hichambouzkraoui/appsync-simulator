type Query {
  # Users
  getUser(id: ID!): User
  listUsers: [User!]!

  # Orders
  getOrder(id: ID!): Order
  listOrders(userId: ID!): [Order!]!

  # Products
  getProduct(id: ID!): Product
  listProducts(category: String, limit: Int): [Product!]!
  searchProducts(query: String!, limit: Int): [Product!]!

  # Payments
  getPayment(id: ID!): Payment
  listPayments(orderId: ID!): [Payment!]!
}

type Mutation {
  # Users
  createUser(input: CreateUserInput!): User!
  updateUser(id: ID!, input: UpdateUserInput!): User
  deleteUser(id: ID!): Boolean!

  # Orders
  createOrder(input: CreateOrderInput!): Order!
  processOrder(id: ID!): Order!

  # Products
  createProduct(input: CreateProductInput!): Product!
  updateProduct(id: ID!, input: UpdateProductInput!): Product!
  deleteProduct(id: ID!): Boolean!

  # Payments
  chargePayment(input: ChargePaymentInput!): Payment!
  refundPayment(input: RefundPaymentInput!): Payment!
}

# ─── Users ────────────────────────────────────────────────────────────────────

input CreateUserInput {
  name: String!
  email: String!
}

input UpdateUserInput {
  name: String
  email: String
}

type User {
  id: ID!
  name: String!
  email: String!
  createdAt: String!
  updatedAt: String
}

# ─── Orders ───────────────────────────────────────────────────────────────────

input CreateOrderInput {
  userId: ID!
  items: [OrderItemInput!]!
}

input OrderItemInput {
  productId: String!
  quantity: Int!
  price: Float!
}

type Order {
  id: ID!
  userId: ID!
  items: [OrderItem!]!
  total: Float!
  status: OrderStatus!
  createdAt: String!
}

type OrderItem {
  productId: String!
  quantity: Int!
  price: Float!
}

enum OrderStatus {
  PENDING
  PROCESSING
  SHIPPED
  DELIVERED
  CANCELLED
}

# ─── Products ─────────────────────────────────────────────────────────────────

input CreateProductInput {
  name: String!
  description: String
  price: Float!
  category: String!
  stock: Int!
}

input UpdateProductInput {
  name: String
  description: String
  price: Float
  category: String
  stock: Int
}

type Product {
  id: ID!
  name: String!
  description: String
  price: Float!
  category: String!
  stock: Int!
  createdAt: String!
  updatedAt: String
}

# ─── Payments ─────────────────────────────────────────────────────────────────

input ChargePaymentInput {
  orderId: ID!
  amount: Float!
  currency: String!
  paymentMethod: String!
}

input RefundPaymentInput {
  paymentId: ID!
  amount: Float
  reason: String
}

type Payment {
  id: ID!
  orderId: ID!
  amount: Float!
  currency: String!
  status: PaymentStatus!
  paymentMethod: String!
  transactionId: String
  createdAt: String!
  refundedAt: String
  refundReason: String
}

enum PaymentStatus {
  PENDING
  COMPLETED
  FAILED
  REFUNDED
  PARTIALLY_REFUNDED
}
