# AppSync Local Simulator Configuration

schema: schema.graphql

# Datasource definitions
datasources:
  UsersTable:
    type: AMAZON_DYNAMODB
    config:
      tableName: Users
      endpoint: http://localhost:8000
      region: us-east-1

  OrdersTable:
    type: AMAZON_DYNAMODB
    config:
      tableName: Orders
      endpoint: http://localhost:8000
      region: us-east-1

  # JS Lambda — order operations
  UserServiceLambda:
    type: AWS_LAMBDA
    config:
      runtime: nodejs
      functionPath: ../examples/js-lambda/index.js
      handler: handler

  # JS Lambda — product catalog
  ProductCatalogLambda:
    type: AWS_LAMBDA
    config:
      runtime: nodejs
      functionPath: ../examples/product-catalog-lambda/index.js
      handler: handler

  # .NET Lambda — order processor
  OrderProcessorLambda:
    type: AWS_LAMBDA
    config:
      runtime: dotnet
      projectPath: ../examples/dotnet-lambda
      assembly: OrderProcessorLambda
      handler: DotnetLambda::DotnetLambda.Function::FunctionHandler

  # .NET Lambda — payment service
  PaymentServiceLambda:
    type: AWS_LAMBDA
    config:
      runtime: dotnet
      projectPath: ../examples/payment-lambda
      assembly: PaymentServiceLambda
      handler: PaymentLambda::PaymentLambda.Function::FunctionHandler

  LocalResolver:
    type: NONE

  # Java Lambda — inventory service
  InventoryServiceLambda:
    type: AWS_LAMBDA
    config:
      runtime: java
      projectPath: ../examples/java-lambda
      handler: com.example.InventoryHandler

  # Python Lambda — notification service
  NotificationServiceLambda:
    type: AWS_LAMBDA
    config:
      runtime: python
      functionPath: ../examples/python-lambda/handler.py
      handler: handler
      env:
        SMTP_HOST: localhost
        SMTP_PORT: "1025"
        FROM_EMAIL: noreply@example.com
        MAX_RETRIES: "3"

# Resolver mappings
resolvers:
  # ── Users (VTL + DynamoDB) ──────────────────────────────────────────────────
  Query.getUser:
    datasource: UsersTable
    type: vtl
    requestTemplate: ../resolvers/vtl/getUser.request.vtl
    responseTemplate: ../resolvers/vtl/getUser.response.vtl

  Query.listUsers:
    datasource: UsersTable
    type: vtl
    requestTemplate: ../resolvers/vtl/listUsers.request.vtl
    responseTemplate: ../resolvers/vtl/listUsers.response.vtl

  Mutation.createUser:
    datasource: UsersTable
    type: vtl
    requestTemplate: ../resolvers/vtl/createUser.request.vtl
    responseTemplate: ../resolvers/vtl/createUser.response.vtl

  Mutation.deleteUser:
    datasource: UsersTable
    type: vtl
    requestTemplate: ../resolvers/vtl/deleteUser.request.vtl
    responseTemplate: ../resolvers/vtl/deleteUser.response.vtl

  Mutation.updateUser:
    datasource: LocalResolver
    type: js
    code: ../resolvers/js/updateUser.js

  # ── Orders (JS + Lambda/DynamoDB) ───────────────────────────────────────────
  Query.getOrder:
    datasource: OrdersTable
    type: js
    code: ../resolvers/js/getOrder.js

  Query.listOrders:
    datasource: OrdersTable
    type: js
    code: ../resolvers/js/listOrders.js

  Mutation.createOrder:
    datasource: UserServiceLambda
    type: js
    code: ../resolvers/js/createOrder.js

  Mutation.processOrder:
    datasource: OrderProcessorLambda
    type: js
    code: ../resolvers/js/processOrder.js

  # ── Products (JS Lambda) ─────────────────────────────────────────────────────
  Query.getProduct:
    datasource: ProductCatalogLambda
    type: js
    code: ../resolvers/js/getProduct.js

  Query.listProducts:
    datasource: ProductCatalogLambda
    type: js
    code: ../resolvers/js/listProducts.js

  Query.searchProducts:
    datasource: ProductCatalogLambda
    type: js
    code: ../resolvers/js/searchProducts.js

  Mutation.createProduct:
    datasource: ProductCatalogLambda
    type: js
    code: ../resolvers/js/createProduct.js

  Mutation.updateProduct:
    datasource: ProductCatalogLambda
    type: js
    code: ../resolvers/js/updateProduct.js

  Mutation.deleteProduct:
    datasource: ProductCatalogLambda
    type: js
    code: ../resolvers/js/deleteProduct.js

  # ── Payments (.NET Lambda) ───────────────────────────────────────────────────
  Query.getPayment:
    datasource: PaymentServiceLambda
    type: js
    code: ../resolvers/js/getPayment.js

  Query.listPayments:
    datasource: PaymentServiceLambda
    type: js
    code: ../resolvers/js/listPayments.js

  Mutation.chargePayment:
    datasource: PaymentServiceLambda
    type: js
    code: ../resolvers/js/chargePayment.js

  Mutation.refundPayment:
    datasource: PaymentServiceLambda
    type: js
    code: ../resolvers/js/refundPayment.js

  # ── Inventory (Java Lambda) ─────────────────────────────────────────────────
  Query.checkStock:
    datasource: InventoryServiceLambda
    type: js
    code: ../resolvers/js/checkStock.js

  Mutation.reserveStock:
    datasource: InventoryServiceLambda
    type: js
    code: ../resolvers/js/reserveStock.js

  Mutation.releaseStock:
    datasource: InventoryServiceLambda
    type: js
    code: ../resolvers/js/releaseStock.js

  Mutation.adjustStock:
    datasource: InventoryServiceLambda
    type: js
    code: ../resolvers/js/adjustStock.js

  # ── Notifications (Python Lambda) ───────────────────────────────────────────
  Query.getNotification:
    datasource: NotificationServiceLambda
    type: js
    code: ../resolvers/js/getNotification.js

  Query.listNotifications:
    datasource: NotificationServiceLambda
    type: js
    code: ../resolvers/js/listNotifications.js

  Mutation.sendNotification:
    datasource: NotificationServiceLambda
    type: js
    code: ../resolvers/js/sendNotification.js
